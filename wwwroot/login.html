<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Login page</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<!-- Replaced 'bg-light' with our new 'custom-bg' class -->
<body class="bg-light d-flex align-items-center justify-content-center vh-100" 
      style="background-color: white !important;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <!-- Card Container (Added 'shadow-lg' for extra contrast against the background) -->
                <div class="card shadow-lg border-0 px-4 py-5 bg-white rounded-3">
                    <div class="card-body">
                        
                        <!-- Header Wrapper -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1 text-dark">Welcome Back</h2>
                                <p class="text-muted small mb-0">Please enter your details</p>
                            </div>
                            <img src="1.png" alt="ABC logo" class="img-fluid rounded" style="max-height: 50px;">
                        </div>

                        <div id="loginError" class="alert alert-danger d-none py-2 small" role="alert">
                            Invalid username or password.
                        </div>
                        
                        <!-- Form -->
                        <form method="post" action="/account/login">
                            <div class="form-floating mb-3">
                                <input type="text" name="username" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                                <label for="floatingInput">Username</label>
                            </div>
                            
                            <div class="form-floating mb-3">
                                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                                <label for="floatingPassword">Password</label>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label text-muted small" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none small text-primary">Forgot password?</a>
                            </div>
                            
                            <button class="btn btn-primary w-100 py-2 mb-3 fw-medium" type="submit">Sign In</button>
            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (new URLSearchParams(window.location.search).get('error') === '1') {
            document.getElementById('loginError').classList.remove('d-none');
        }
    </script>
</body>
</html>
